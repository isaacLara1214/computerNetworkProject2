[build]
  command = "sh build.sh"
  publish = "."

[[redirects]]
  from = "http://compnetworkproject2.netlify.app/*"
  to   = "https://compnetworkproject2.netlify.app/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googletagmanager.com https://www.google.com https://*.firebaseio.com https://*.googleapis.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://www.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://www.google-analytics.com; frame-src https://www.google.com; img-src 'self' data: https://www.google-analytics.com;"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
